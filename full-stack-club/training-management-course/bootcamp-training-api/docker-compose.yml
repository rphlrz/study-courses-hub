services:
  postgres:
    image: postgres:16-alpine
    container_name: gestao-de-treinos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bootcamp_treinos_api
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: