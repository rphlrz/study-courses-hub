<!--I created this HTML here based on the users template and changed the h3 on line 4 -->
<div class="container">
  <div class="py-3 text-center">
    <h3>Evaluation Registration</h3>
  </div>
  <div class="row">
    <div class="col-12 d-flex align-content-end justify-content-end pb-5">
      <a class="btn btn-primary" [href]="'/evaluations'">BACK</a>
    </div>
  </div>
  <div class="row d-flex align-content-center justify-content-center">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <formly-form [form]="form" [model]="model" [fields]="fields">
      </formly-form>

      <div class="col-12 d-flex align-content-center justify-content-center pt-5">
        <button class="btn btn-primary" type="submit">
          Save
        </button>

        <button class="btn btn-danger" type="reset">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
